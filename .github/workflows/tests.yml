name: Tests

# Runs the backend test suite on every push and pull request.
# Uses an isolated SQLite DB (never TiDB) and disables AI for determinism —
# so CI needs no secrets. A red check here blocks broken code from shipping.

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          SECRET_KEY: "ci-test-secret"
          CEREBRAS_API_KEY: ""
        run: pytest -q
